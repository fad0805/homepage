services:
  db:
    restart: always
    image: postgres:14-alpine
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', '${POSTGRES_USER}', '-d', '${POSTGRES_DB}']
    networks:
      - internal_network
    volumes:
      - ./db:/var/lib/postgresql/data
    env_file: .env.production

  api:
    restart: always
    build: ./api
    networks:
      - internal_network
    volumes:
      - ./api/alembic/versions:/app/alembic/versions
    depends_on:
      - db
    env_file: .env.production

  web:
    restart: always
    build: ./web
    networks:
      - external_network
      - internal_network
    ports:
      - "127.0.0.1:2222:3000"
    depends_on:
      - api
      - db

networks:
  external_network:
  internal_network:
    internal: true
